        ? \f[B]CondinAPT\f[R] is a versatile tool for automating package installation in any Debian-like system (Debian, Ubuntu, and their derivatives).  Its key feature is the ability to define complex conditions and rules for installing each package based on arbitrary system configurations.\fR
        : 8c8a3aa203642f09c2fc16f9a016185e
        \f[B]Conditional Installation:\f[R] Install packages based on flexible filters (+, -)\fR: 8344b55986df61d2fcfbef0ed10ef8b2
        \f[B]Empty lines:\f[R] Ignored and serve for visual separation\fR: 825fff5688ca62d28421c6ff99683375
        \f[B]External Configuration:\f[R] Complete separation of logic (package list) from data (system parameters)\fR: 94bb806f7d795403edf70462a4e63977
        \f[B]Installation Queues:\f[R] Divide the process into sequential stages to resolve dependencies\fR: 51c0772741dcc8da1334beb4994f5a48
        \f[B]Loose Versions (=):\fR: 12c733c765efafbe089ef77feeafae73
        ? \f[B]Override:\f[R] Matched packages are automatically removed from their original queues (both regular and target queues with \f[B]\[at]release\f[R]) and moved to priority queues.  Target releases are preserved in separate priority target queues.\fR
        : a8fa49b470fc562797c32b6a8fec0d78
        \f[B]Package names:\f[R] Each package or condition is written on a new line\fR: e8333d47d33dd04725ae45424b6959c2
        \f[B]Package version:\fR: 5bfda0860fc1bc88ca6f3a9eb26ddab0
        ? \f[B]Pattern Matching:\f[R] Uses bash regex matching (=\[ti] operator).  Patterns can be simple package names or complex regex expressions.\fR
