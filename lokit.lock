        ? \f[B]minios-cmd\f[R] is a command-line utility designed to simplify the process of configuring and building customized MiniOS system images.  Acting as a frontend for \f[B]minios-live\f[R](1), it manages the configuration and invokes \f[B]minios-live\f[R] to execute the actual build steps.\fR
        : ca6c8fb26cde84697b14bd8d6b0569bc
        ? \f[B]minios-cmd\f[R] prepares the build environment and generates a \f[B]build.conf\f[R] configuration file based on the options provided.  It then calls \f[B]minios-live\f[R] with the relevant environment variables, delegating the build execution to \f[B]minios-live\f[R].\fR
        : 360a84ccc53b680f92dfe89754774010
